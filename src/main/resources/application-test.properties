# Test profile — H2 in-memory
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;MODE=PostgreSQL
quarkus.datasource.username=sa
quarkus.datasource.password=

# Schema managed by Hibernate (skip Liquibase)
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.liquibase.migrate-at-start=false

# Disable Envers to avoid H2 AUD table issues
quarkus.hibernate-envers.enabled=false

# Disable scheduled jobs in tests
quarkus.scheduler.enabled=false

# Disable JWT in tests
quarkus.smallrye-jwt.enabled=false
mp.jwt.verify.publickey.location=
quarkus.rest-client.permission-api.url=http://localhost:0
quarkus.rest-client.idfc-bank-api.url=http://localhost:0
quarkus.rest-client.hdfc-bank-api.url=http://localhost:0
quarkus.rest-client.lms-api.url=http://localhost:0
