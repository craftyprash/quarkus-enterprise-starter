# Application
quarkus.application.name=quarkus-starter-enterprise

# Datasource — credentials come from .env or environment
quarkus.datasource.db-kind=postgresql

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# OpenAPI / Swagger
quarkus.smallrye-openapi.info-title=Starter Enterprise API
quarkus.smallrye-openapi.info-version=${quarkus.application.version:0.1.0}
quarkus.swagger-ui.always-include=true

# Health
quarkus.health.extensions.enabled=true

# Micrometer
quarkus.micrometer.export.prometheus.enabled=true

# Jackson
quarkus.jackson.fail-on-unknown-properties=true
quarkus.jackson.serialization-inclusion=non-null
quarkus.jackson.write-dates-as-timestamps=false
quarkus.jackson.timezone=UTC

# HTTP
quarkus.http.port=8080

# JWT
mp.jwt.verify.publickey.location=META-INF/resources/publickey.pem
mp.jwt.verify.issuer=https://auth.starter.com
quarkus.smallrye-jwt.enabled=true

# External APIs
quarkus.rest-client.permission-api.url=http://localhost:9090
quarkus.rest-client.permission-api.scope=jakarta.inject.Singleton
